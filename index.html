<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopLens – AI Shopping Engine</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

  <!-- 🌐 NAVBAR -->
  <nav class="navbar">
    <div class="logo">ShopLens</div>

    <div class="nav-links">
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('ai')">AI</button>
      <button onclick="showPage('trending')">Trending</button>
      <button onclick="showPage('assistant')">Assistant</button>
      <button onclick="showPage('about')">About</button>
    </div>
  </nav>

  <!-- 🏠 HOME PAGE -->
  <section id="home" class="page active">

    <h1>ShopLens</h1>
    <p>Search. Scan. Style. Shop.</p>

  </section>

  <!-- 🤖 AI PAGE -->
  <section id="ai" class="page">

    <h2>ShopLens AI</h2>

    <input id="searchBox" placeholder="Ask outfit, shoes, gym..."/>
    <button onclick="searchAI()">Search</button>

    <div id="results"></div>

  </section>

  <!-- 🔥 TRENDING PAGE -->
  <section id="trending" class="page">

    <h2>🔥 Trending Products</h2>

    <div class="card">Nike Shoes</div>
    <div class="card">Hoodie</div>
    <div class="card">Watch</div>

  </section>

  <!-- 🧠 ASSISTANT PAGE -->
  <section id="assistant" class="page">

    <h2>AI Assistant</h2>

    <p>Ask styling questions here</p>

    <input placeholder="What matches black jeans?"/>
    <button>Ask</button>

  </section>

  <!-- 👤 ABOUT PAGE -->
  <section id="about" class="page">

    <h2>About ShopLens</h2>

    <p>
      ShopLens is an AI-powered shopping assistant that helps users find outfits,
      compare products, and discover styles easily.
    </p>

  </section>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoplens – Trending</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sparkle s1">✦</div>
  <div class="sparkle s2">✦</div>

  <nav class="navbar">
    <div class="logo">shoplens</div>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="search.html" class="nav-link">AI Search</a>
      <a href="trending.html" class="nav-link active">Trending</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="assistant.html" class="nav-link">Assistant</a>
    </div>

    <div class="nav-right">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>

  <div class="page-hero">
    <h1>What's <span class="ai-text">Trending</span></h1>
    <p>Real trending products updated automatically.</p>
  </div>

  <div id="trendingGrid"></div>

  <script src="script.js"></script>

   <script>
async function loadTrending() {

  try {

    const response = await fetch("/api/trending");

    const responseData = await response.json();
    const data = responseData.categories || [];

    const categoryMap = {
      clothing: "Clothing",
      shoes: "Shoes",
      beauty: "Beauty Products",
      accessories: "Accessories",
      gadgets: "Gadgets"
    };

    Object.keys(categoryMap).forEach(catId => {

      const container =
        document.getElementById(catId);

      if (!container) return;

      const catObj =
        data.find(
          c => c.title === categoryMap[catId]
        );

      const products =
        catObj?.products || [];

      container.innerHTML =
        products.map(item => `
          <div class="trend-card">

            <img
              src="${item.image}"
              style="
              width:100%;
              height:200px;
              object-fit:cover;
              border-radius:16px;
              "
            >

            <div style="
              margin-top:10px;
              font-size:12px;
              font-weight:700;
              color:#ff4d4d;
            ">
              ${item.badge}
            </div>

            <h3>${item.name}</h3>

            <p>
              ⭐ ${item.rating}
            </p>

            <p>
              📈 Trending Score:
              ${item.trending_score}
            </p>

            <p style="
              font-weight:800;
              font-size:18px;
            ">
              ${item.price}
            </p>

            <a
              href="${item.link}"
              target="_blank"
              class="store-btn"
            >
              View Deal →
            </a>

          </div>
        `).join("");

    });

  } catch (err) {

    console.error(err);

    document.getElementById(
      "trendingGrid"
    ).innerHTML = `
      <p style="
      text-align:center;
      padding:50px;
      ">
      ❌ Failed to load trends
      </p>
    `;

  }

}

loadTrending();
</script>
